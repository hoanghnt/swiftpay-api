global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: swiftpay-monolith
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['swiftpay-api:8080']

  - job_name: swiftpay-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway:8081']

  - job_name: swiftpay-auth
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['auth-service:8082']

  - job_name: swiftpay-wallet
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['wallet-service:8083']

  - job_name: swiftpay-transaction
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['transaction-service:8084']
