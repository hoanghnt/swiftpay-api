spring:
  application:
    name: swiftpay

  threads:
    virtual:
      enabled: true

  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
        default_schema: public

  datasource:
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SwiftPayHikariPool

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        transport:
          protocol: smtp

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML
    cache: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    default-property-inclusion: non_null
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  health:
    mail:
      enabled: false
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
  show-actuator: false

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    org.springframework: INFO
    com.hoanghnt.swiftpay: INFO

app:
  startup:
    fail-fast: ${STARTUP_FAIL_FAST:true}

  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    window: ${RATE_LIMIT_WINDOW:60s}
    default-limit: ${RATE_LIMIT_DEFAULT:100}

  security:
    jwt:
      secret: ${JWT_SECRET}
      algorithm: HS512
      access-token-expiration: 15m
      refresh-token-expiration: 7d
    login:
      max-failed-attempts: 5
      lockout-duration: 15m

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

  wallet-service:
    base-url: ${SWIFTPAY_WALLET_URI:http://localhost:8083/api}
    internal-api-key: ${INTERNAL_API_KEY:swiftpay-internal-secret}

  auth-service:
    base-url: ${SWIFTPAY_AUTH_URI:http://localhost:8082/api}
    internal-api-key: ${INTERNAL_API_KEY:swiftpay-internal-secret}
  transaction-service:
    base-url: ${SWIFTPAY_TXN_URI:http://localhost:8084/api}
    internal-api-key: ${INTERNAL_API_KEY:swiftpay-internal-secret}

  otp:
    expiration: 5m
    length: 6

  wallet:
    max-daily-transfer: 50000000
    min-transfer-amount: 1000
    max-transfer-amount: 10000000
    withdraw-fee-percent: 0.01

  idempotency:
    ttl: 24h

  notifications:
    enabled: ${NOTIFICATIONS_ENABLED:true}

resilience4j:
  circuitbreaker:
    configs:
      adminClient:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 3s
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-exceptions:
          - com.hoanghnt.swiftpay.client.DownstreamUnavailableException
    instances:
      authService:
        base-config: adminClient
      walletService:
        base-config: adminClient
      txnService:
        base-config: adminClient
