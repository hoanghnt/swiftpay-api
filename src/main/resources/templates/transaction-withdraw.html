<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận rút tiền</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
<div style="background: #f8f9fa; padding: 30px; border-radius: 8px;">
    <h1 style="color: #2563eb;">Xác nhận rút tiền thành công</h1>
    <p>Chào <strong th:text="${username}">User</strong>,</p>
    <p>Yêu cầu rút tiền của bạn đã được xử lý thành công.</p>
    <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
        <tr>
            <td style="padding: 8px 0; color: #6b7280;">Số tiền rút</td>
            <td style="padding: 8px 0; text-align: right;" th:text="${amount} + ' VND'"></td>
        </tr>
        <tr>
            <td style="padding: 8px 0; color: #6b7280;">Phí giao dịch</td>
            <td style="padding: 8px 0; text-align: right;" th:text="${fee} + ' VND'"></td>
        </tr>
        <tr>
            <td style="padding: 8px 0; color: #6b7280; font-weight: bold;">Số tiền thực nhận</td>
            <td style="padding: 8px 0; text-align: right; font-weight: bold;" th:text="${netAmount} + ' VND'"></td>
        </tr>
        <tr>
            <td style="padding: 8px 0; color: #6b7280;">Mã giao dịch</td>
            <td style="padding: 8px 0; text-align: right;" th:text="${transactionId}"></td>
        </tr>
    </table>
    <p style="color: #6b7280; font-size: 14px;">Nếu bạn không thực hiện giao dịch này, vui lòng liên hệ hỗ trợ ngay.</p>
</div>
</body>
</html>
