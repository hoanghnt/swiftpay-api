<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset your password</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
<div style="background: #f8f9fa; padding: 30px; border-radius: 8px;">
    <h1 style="color: #2563eb;">Reset your password</h1>
    <p>Hi <strong th:text="${username}">User</strong>,</p>
    <p>We received a request to reset your SwiftPay password. Click the button below:</p>
    <p style="text-align: center; margin: 30px 0;">
        <a th:href="${resetLink}"
           style="background: #dc2626; color: white; padding: 12px 30px; text-decoration: none; border-radius: 4px; display: inline-block;">
            Reset Password
        </a>
    </p>
    <p>Or copy this link:</p>
    <p><a th:href="${resetLink}" th:text="${resetLink}"></a></p>
    <p style="color: #6b7280; font-size: 14px;">⚠️ This link expires in <strong>15 minutes</strong>.</p>
    <p style="color: #6b7280; font-size: 14px;">If you didn't request this, please ignore this email. Your password will not change.</p>
</div>
</body>
</html>
