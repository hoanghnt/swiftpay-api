<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verify your account</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
<div style="background: #f8f9fa; padding: 30px; border-radius: 8px;">
    <h1 style="color: #2563eb;">Welcome to SwiftPay!</h1>
    <p>Hi <strong th:text="${username}">User</strong>,</p>
    <p>Thanks for registering. Please click the button below to verify your email address:</p>
    <p style="text-align: center; margin: 30px 0;">
        <a th:href="${verificationLink}"
           style="background: #2563eb; color: white; padding: 12px 30px; text-decoration: none; border-radius: 4px; display: inline-block;">
            Verify Email
        </a>
    </p>
    <p>Or copy this link:</p>
    <p><a th:href="${verificationLink}" th:text="${verificationLink}"></a></p>
    <p style="color: #6b7280; font-size: 14px;">This link will expire in 24 hours.</p>
    <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 20px 0;">
    <p style="color: #6b7280; font-size: 12px;">If you didn't create this account, please ignore this email.</p>
</div>
</body>
</html>
