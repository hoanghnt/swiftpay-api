spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require&prepareThreshold=0
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      pool-name: SwiftPayHikariPool-Prod
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  thymeleaf:
    cache: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}
      timeout: 5s
      connect-timeout: 3s
      lettuce:
        pool:
          max-active: 4
          max-idle: 2
          min-idle: 0
    mongodb:
      uri: ${MONGO_URI}

server:
  port: ${PORT:8080}

app:
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE}
    hash-secret: ${VNPAY_HASH_SECRET}
    pay-url: ${VNPAY_PAY_URL}
    return-url: ${VNPAY_RETURN_URL}
    ipn-url: ${VNPAY_IPN_URL}

  email:
    verification-url: ${APP_VERIFICATION_URL}
    reset-password-url: ${APP_RESET_PASSWORD_URL}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    com.hoanghnt.swiftpay: INFO

management:
  endpoint:
    health:
      show-details: never
